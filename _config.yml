title: Ygar Studio
description: Independent mobile game studio. Games for the curious.
url: "https://ygar-studio.github.io"
baseurl: "/pages"
email: ygar.studio@gmail.com

logo: /assets/logo.svg

twitter:
  username: ygastudio
  card: summary

social:
  name: Ygar Studio
  links:
    - https://play.google.com/store/apps/developer?id=Ygar+Studio

plugins:
  - jekyll-multiple-languages-plugin
  - jekyll-sitemap
  - jekyll-seo-tag

languages:
  - en
  - fr
default_locale: en
exclude_from_localizations:
  - assets
  - .github
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md

exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - .claude/
  - .idea/
  - vendor/
  - .bundle/

sass:
  style: compressed
