<style>
  @keyframes err-float    { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
  @keyframes err-glow     { 0%,100% { opacity:.4; } 50% { opacity:.9; } }
  @keyframes err-twinkle  { 0%,100% { opacity:.15; } 50% { opacity:.8; } }
  @keyframes err-scroll-v { 0% { transform:translateY(-100%); } 100% { transform:translateY(100%); } }

  .err-bg {
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(185,132,12,0.14) 0%, transparent 70%),
      linear-gradient(180deg,#050D1F 0%,#0A1128 60%,#1A0D2E 100%);
  }
  .err-tablet {
    position:relative;
    width:220px; height:280px;
    border:2px solid #D4A947;
    border-radius:14px;
    background:linear-gradient(145deg, rgba(212,169,71,0.08), rgba(212,169,71,0.02));
    box-shadow:0 0 60px rgba(212,169,71,0.25), inset 0 0 40px rgba(212,169,71,0.08);
    animation: err-float 6s ease-in-out infinite;
    overflow:hidden;
  }
  .err-tablet::before,
  .err-tablet::after {
    content:""; position:absolute; left:14px; right:14px; height:1px;
    background:rgba(212,169,71,0.25);
  }
  .err-tablet::before { top:28%; }
  .err-tablet::after  { top:62%; }
  .err-crack {
    position:absolute; top:10%; left:50%; width:3px; height:80%;
    background:linear-gradient(180deg, transparent, #050D1F 20%, #050D1F 80%, transparent);
    transform:translateX(-50%) rotate(8deg);
    box-shadow:0 0 8px rgba(0,0,0,0.6);
  }
  .err-glyphs {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:space-around; padding:24px 18px;
    color:#D4A947; font-size:28px; letter-spacing:6px;
    font-family:'Noto Sans','Segoe UI Historic',sans-serif;
    text-shadow:0 0 10px rgba(212,169,71,0.4);
  }
  .err-glyphs span { animation: err-glow 4s ease-in-out infinite; }
  .err-glyphs span:nth-child(2) { animation-delay:1s; opacity:.7; }
  .err-glyphs span:nth-child(3) { animation-delay:2s; opacity:.5; }
  .err-star {
    position:absolute; width:2px; height:2px; background:#D4A947; border-radius:50%;
    box-shadow:0 0 4px #D4A947; animation: err-twinkle 4s ease-in-out infinite;
  }
</style>
